<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全国成品仓运营数据大屏</title>
    <link rel="stylesheet" href="css/style.css?v=4">
    <script src="js/chart.umd.min.js?v=4"></script>
    <script src="js/xlsx.full.min.js?v=4"></script>
</head>
<body>
    <!-- 主容器 -->
    <div class="dashboard">

        <!-- 顶部标题栏 -->
        <header class="header">
            <div class="header-left">
                <div class="tech-icon">&#x2B21;</div>
                <span class="header-title">全国成品仓运营数据大屏</span>
            </div>
            <div class="header-center">
                <div class="header-date" id="headerDate"></div>
                <div class="header-time" id="headerTime"></div>
            </div>
            <div class="header-right">
                <button class="btn-tech" onclick="downloadTemplate()">&#x2B07; 下载模板</button>
                <button class="btn-tech btn-orange" onclick="document.getElementById('importFile').click()">&#x1F4C2; 导入数据</button>
                <input type="file" id="importFile" accept=".xlsx,.xls,.csv" style="display:none" onchange="importData(event)">
                <button class="btn-tech" onclick="exportData()">&#x1F4E5; 导出数据</button>
                <button class="btn-tech" onclick="openManualEdit()">&#x270F; 手动编辑</button>
            </div>
        </header>

        <!-- 第一行：安全运营 + 入库/出库/吞吐量 -->
        <section class="row-kpi">
            <div class="kpi-card kpi-safety" id="safetyCard">
                <div class="kpi-label">安全运营</div>
                <div class="kpi-value" id="safetyCount">0</div>
                <div class="kpi-unit">起</div>
            </div>
            <div class="kpi-card kpi-volume" id="inboundCard">
                <div class="kpi-header">
                    <span class="kpi-title">入库量</span>
                    <span class="kpi-sub">单位：万台</span>
                </div>
                <div class="kpi-body">
                    <div class="kpi-number" id="inboundVolume">0</div>
                    <div class="kpi-mom">
                        <div class="mom-item">
                            <span class="mom-label">环比</span>
                            <span class="mom-value" id="inboundMoM">0%</span>
                        </div>
                        <div class="mom-item">
                            <span class="mom-label">同期</span>
                            <span class="mom-compare" id="inboundCompare">0</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="kpi-card kpi-volume" id="outboundCard">
                <div class="kpi-header">
                    <span class="kpi-title">出库量</span>
                    <span class="kpi-sub">单位：万台</span>
                </div>
                <div class="kpi-body">
                    <div class="kpi-number" id="outboundVolume">0</div>
                    <div class="kpi-mom">
                        <div class="mom-item">
                            <span class="mom-label">环比</span>
                            <span class="mom-value" id="outboundMoM">0%</span>
                        </div>
                        <div class="mom-item">
                            <span class="mom-label">同期</span>
                            <span class="mom-compare" id="outboundCompare">0</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="kpi-card kpi-volume" id="throughputCard">
                <div class="kpi-header">
                    <span class="kpi-title">吞吐量</span>
                    <span class="kpi-sub">单位：万台</span>
                </div>
                <div class="kpi-body">
                    <div class="kpi-number" id="throughputVolume">0</div>
                    <div class="kpi-mom">
                        <div class="mom-item">
                            <span class="mom-label">环比</span>
                            <span class="mom-value" id="throughputMoM">0%</span>
                        </div>
                        <div class="mom-item">
                            <span class="mom-label">同期</span>
                            <span class="mom-compare" id="throughputCompare">0</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 第二行：四地库存概览 + 趋势图 + 运营指标 -->
        <section class="row-main">
            <!-- 左侧：四地库存概览 -->
            <div class="panel panel-left">
                <div class="panel-title">&#x1F4CA; 四地库存概览</div>
                <div class="city-cards" id="cityCards"></div>
            </div>

            <!-- 中间：趋势图 -->
            <div class="panel panel-center">
                <div class="chart-tabs">
                    <button class="chart-tab active" onclick="switchChart('inout')">出入库趋势</button>
                    <button class="chart-tab" onclick="switchChart('saturation')">饱和度趋势</button>
                    <button class="chart-tab" onclick="switchChart('rate')">及时率趋势</button>
                </div>
                <div class="chart-container">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>

            <!-- 右侧：运营指标 -->
            <div class="panel panel-right">
                <div class="panel-title">&#x2696; 运营指标</div>
                <div class="metric-grid" id="metricGrid"></div>
            </div>
        </section>

        <!-- 第三行：入库作业峰值 + 逆向物流看板 -->
        <section class="row-bottom">
            <!-- 库存周转天数 -->
            <div class="panel panel-peak">
                <div class="panel-title">&#x1F3D7; 库存周转天数</div>
                <div class="peak-cards" id="peakCards"></div>
            </div>

            <!-- 逆向物流看板 -->
            <div class="panel panel-reverse">
                <div class="panel-title">&#x1F504; 逆向物流看板</div>
                <div class="table-wrapper">
                    <table class="data-table" id="reverseTable">
                        <thead>
                            <tr>
                                <th>地区</th>
                                <th>接收总量/台</th>
                                <th>转正量</th>
                                <th>待转正量</th>
                                <th>京东呆滞退</th>
                                <th>京东在途退</th>
                                <th>菜鸟呆滞退</th>
                                <th>菜鸟在途退</th>
                                <th>2C呆滞退</th>
                                <th>2C在途退</th>
                                <th>经销商退</th>
                                <th>KA退</th>
                                <th>换包量</th>
                                <th>占用面积</th>
                            </tr>
                        </thead>
                        <tbody id="reverseBody"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <!-- 手动编辑弹窗 -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <span>&#x270F; 手动编辑数据</span>
                <button class="modal-close" onclick="closeManualEdit()">&#x2715;</button>
            </div>
            <div class="modal-body" id="editForm"></div>
            <div class="modal-footer">
                <button class="btn-tech btn-orange" onclick="saveManualEdit()">&#x1F4BE; 保存</button>
                <button class="btn-tech" onclick="closeManualEdit()">取消</button>
            </div>
        </div>
    </div>

    <!-- JS 加载顺序 -->
    <script src="js/data.js?v=4"></script>
    <script src="js/charts.js?v=4"></script>
    <script src="js/app.js?v=4"></script>
</body>
</html>
